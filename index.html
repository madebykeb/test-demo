<!DOCTYPE html>
<html>
<head>
<title>The Ultimate Podcast Directory</title>
</head>
<body>
<h1>The Ultimate Podcast Directory</h1>

<form id="form">
  <input id="rss" placeholder="Paste RSS feed" required>
  <button>Submit Podcast</button>
</form>

<div id="result"></div>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const rssUrl = document.getElementById("rss").value;

  const response = await fetch("/api/rss", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ rssUrl })
  });

  const data = await response.json();

  if (data.error) {
    document.getElementById("result").innerHTML = `<p>${data.error}</p>`;
    return;
  }

  document.getElementById("result").innerHTML = `
    <div style="max-width:350px;">
      <img src="${data.artwork}" style="width:100%;border-radius:20px;">
      <h2>${data.title}</h2>
      <p>${data.description}</p>
      <p><strong>Category:</strong> ${data.category}</p>
      <p><strong>Latest:</strong> ${data.latestEpisode}</p>
      <a href="${data.website}" target="_blank">Visit Podcast</a>
    </div>
  `;
});
</script>
</body>
</html>
